specificationVersion: "0.1"
id: cognee-plans-pricing
name: Cognee Plans and Pricing
description: Pricing plans for the Cognee AI memory and knowledge graph platform, covering cloud-hosted tiers and on-premises enterprise deployments.
url: https://www.cognee.ai/pricing

plans:
  - name: Free
    description: >
      Community tier for individual developers exploring Cognee's AI memory capabilities.
      Includes full access to memory workflows, knowledge graph generation, integrated
      evaluations, and support for more than 28 data source connectors. Supported via
      community channels.
    url: https://www.cognee.ai/pricing
    price:
      amount: 0
      currency: USD
      period: month
    features:
      - Build and run memory workflows with tasks and pipelines
      - Auto-generate knowledge structures from data
      - Integrated evaluations
      - Support for 28+ data sources
      - Community support (Discord)
    limits:
      documents: unspecified
      users: 1
      apiCalls: unspecified

  - name: Developer
    description: >
      Single-user plan for professional developers building production AI memory
      applications. Hosted on AWS, GCP, or Azure with automated scaling, parallel
      processing, and 10,000 included API calls per month. Additional document storage
      available as top-up packs.
    url: https://www.cognee.ai/pricing
    price:
      amount: 35
      currency: USD
      period: month
    features:
      - Everything in Free tier
      - 1 user account
      - Hosting on AWS, GCP, and Azure
      - Comprehensive API endpoints
      - Automated scaling and parallel processing
      - Automatic updates
      - 10,000 API calls included
    limits:
      documents: 1000
      storage: 1 GB
      users: 1
      apiCalls: 10000
    topUpPacks:
      - name: +1,000 docs (~1 GB)
        price:
          amount: 35
          currency: USD
      - name: +3,000 docs (~3 GB)
        price:
          amount: 100
          currency: USD
      - name: +15,000 docs (~15 GB)
        price:
          amount: 750
          currency: USD

  - name: Cloud (Team)
    description: >
      Multi-user team plan with multi-tenant architecture, enabling memory to be grouped
      per user and domain. Includes a dedicated Slack support channel and 10,000 API calls
      per month. Suitable for teams building collaborative AI agent memory systems.
    url: https://www.cognee.ai/pricing
    price:
      amount: 200
      currency: USD
      period: month
    features:
      - Everything in Developer tier
      - 10 user accounts
      - Multi-tenant architecture
      - Group memories per user and domain
      - Dedicated Slack channel support
      - 10,000 API calls included
    limits:
      documents: 2500
      storage: 2 GB
      users: 10
      apiCalls: 10000
    topUpPacks:
      - name: +1,000 docs (~1 GB)
        price:
          amount: 35
          currency: USD
      - name: +3,000 docs (~3 GB)
        price:
          amount: 100
          currency: USD
      - name: +15,000 docs (~15 GB)
        price:
          amount: 750
          currency: USD

  - name: On-Prem (Enterprise)
    description: >
      Enterprise plan for organizations requiring on-premises or private cloud deployment
      with full data control, dedicated architecture review, premium SLA support, and
      access to AI Field Developer Engineers. Pricing is custom and negotiated based on
      usage, infrastructure, and support requirements.
    url: https://www.cognee.ai/pricing
    price:
      amount: custom
      currency: USD
      period: month
    features:
      - Everything in Cloud (Team) tier
      - On-premises or private cloud deployment
      - Security, data isolation, and optimal latency
      - Dedicated architecture review
      - Premium Support Plan and SLA
      - Access to AI FDE Engineers
      - Roadmap prioritization
    limits:
      documents: custom
      storage: custom
      users: custom
      apiCalls: custom
